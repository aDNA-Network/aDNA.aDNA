lattice:
  name: protein_binder_design
  version: "1.0.0"
  lattice_type: pipeline
  description: >
    End-to-end pipeline for designing novel protein therapeutics that bind
    specific protein targets. Generates diverse backbone scaffolds, designs
    optimized sequences, validates structures, and ranks candidates by
    binding quality — producing synthesis-ready protein binder candidates.
  execution:
    mode: workflow
    runtime: ray
    tier: L2
  nodes:
    - id: target_structure
      type: dataset
      ref: "what/datasets/dataset_protein_structures"
      description: "Target protein PDB structure with binding site annotation"
    - id: backbone_design
      type: module
      ref: "what/modules/module_rfdiffusion"
      description: "Generate diverse backbone scaffolds targeting binding interface"
      config:
        num_designs: 100
        scaffold_lengths: [80, 100, 120, 150]
        hotspot_weight: 3.0
        diffusion_steps: 200
    - id: sequence_design
      type: module
      ref: "what/modules/module_ligand_mpnn"
      description: "Design amino acid sequences for generated backbones"
      config:
        temperature: 0.1
        num_sequences_per_backbone: 10
        omit_AAs: ["C"]
        design_only_positions: "interface"
    - id: structure_prediction
      type: module
      ref: "what/modules/module_chai_1"
      description: "Predict binder-target complex structures"
      config:
        num_models: 5
        num_recycles: 4
        inference_mode: "multimer"
    - id: interface_analysis
      type: module
      ref: "what/modules/module_pinal"
      description: "Analyze binding interfaces and predict affinity"
      config:
        interface_cutoff: 8.0
        calculate_sasa: true
        energy_function: "ref2015"
    - id: ranking
      type: process
      description: "Select best candidates for synthesis based on composite scoring"
  edges:
    - from: target_structure
      to: backbone_design
      label: "target PDB"
      data_mapping:
        pdb_file: input_pdb
    - from: backbone_design
      to: sequence_design
      label: "backbone PDBs"
      data_mapping:
        backbone_pdbs: input_structures
    - from: sequence_design
      to: structure_prediction
      label: "designed sequences"
      data_mapping:
        sequences: input_sequences
    - from: target_structure
      to: structure_prediction
      label: "target for multimer"
      port: target
      data_mapping:
        pdb_file: target_structure
    - from: structure_prediction
      to: interface_analysis
      label: "predicted complexes"
      data_mapping:
        complex_structures: input_complexes
    - from: interface_analysis
      to: ranking
      label: "binding metrics"
      data_mapping:
        interface_scores: scores
    - from: structure_prediction
      to: ranking
      label: "confidence scores"
      data_mapping:
        plddt: plddt_scores
        iptm: iptm_scores
  fair:
    license: "MIT"
    creators:
      - "Lattice Labs"
    keywords:
      - protein binder
      - de novo design
      - therapeutic protein
      - protein-protein interaction
      - RFdiffusion
      - LigandMPNN
    provenance: "End-to-end computational protein binder design pipeline — backbone generation through structure prediction, interface analysis, and candidate ranking"
  federation:
    shareable: true
    source_instance: adna
    version_policy: minor
