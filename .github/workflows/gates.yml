name: gates

# Standing watch — the always-on automated floor (WEBSITE.aDNA campaign, P4 sign-off).
# Runs the full Playwright gate suite on every push to main and every PR so credibility /
# craft / perf / a11y drift fails loudly instead of shipping silently. The suite (site/tests/gates/)
# includes G1 (Lighthouse-budget fixture), G2 (@audit full-route × both-modes sweep), gate-4 axe
# in BOTH light and dark modes, single-source/public-meta/link-graph/no-JS/llms.txt/colour gates.
#
# RUNS IN THE PLAYWRIGHT CONTAINER (2026-06-24 — Operation aDNA post-launch consolidation).
# Root cause of the prior "never green" standing-watch: `npx playwright install --with-deps chromium`
# hung ~30 min in its apt/OS-deps phase every run and was killed on timeout — the build + tests never
# ran. The fix is the official Playwright CI image (browsers + OS deps preinstalled, version-matched to
# @playwright/test 1.59.1), so there is no browser-install step at all. (A short-lived fast/audit matrix
# shard tried earlier addressed the wrong layer — the tests were never the bottleneck — and is reverted
# back to this single job.)
#
# CI-safe build: this repo is the aDNA.aDNA vault; the prebuild data-projection
# (scripts/build_vaults_data.mjs, build_install_truth.mjs) reads sibling vaults (Home.aDNA, .adna)
# that are NOT in this checkout. We therefore build with `npx astro build` (skips the npm prebuild
# entirely) so the gates run against the committed src/data/* — the same posture-safe build the
# campaign uses locally (never `npm run build` in CI; that would attempt a vault-data regen).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 30
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build (posture-safe — committed data, no prebuild regen)
        run: npx astro build

      - name: Run quality gates (G1 budget · G2 @audit · axe both-modes · all)
        run: npm run test:gates
